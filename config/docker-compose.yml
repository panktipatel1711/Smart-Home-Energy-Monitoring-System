version: '3.8'
services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot_mqtt_broker
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data

  influxdb:
    image: influxdb:2.7
    container_name: iot_timeseries_db
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  telegraf:
    image: telegraf:1.28
    container_name: ingestion_pipeline_router
    depends_on:
      - mosquitto
      - influxdb
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro

  grafana:
    image: grafana/grafana:10.1
    container_name: analytical_visualization_dashboard
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mosquitto_data:
  influxdb_data:
  grafana_data:
